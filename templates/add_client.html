{% extends "base.html" %}

{% block title %}Добавление клиента - AltaiGlobal{% endblock %}

{% block content %}
<h1>Добавление клиента</h1>

<div class="row">
    <div class="col-lg-8 col-xl-7">
        <form method="POST" id="addClientForm">
            <!-- CLIENT DATA -->
            <div class="card mb-3">
                <div class="card-header">
                    <h6 class="mb-0">Данные клиента</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="full_name" class="form-label">ФИО клиента</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required autocomplete="off">
                        <div class="form-text" id="full_name_feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label for="phone_number" class="form-label">Номер телефона</label>
                        <input type="text" class="form-control" id="phone_number" name="phone_number" maxlength="10" required autocomplete="off">
                        <div class="form-text" id="phone_feedback">Введите 10 цифр</div>
                    </div>
                    <div class="mb-3">
                        <label for="inn" class="form-label">ИНН</label>
                        <input type="text" class="form-control" id="inn" name="inn" maxlength="14" required autocomplete="off">
                        <div class="form-text" id="inn_feedback">Введите 14 цифр</div>
                    </div>
                </div>
            </div>

            <!-- VEHICLE DATA -->
            <div class="card mb-3">
                <div class="card-header">
                    <h6 class="mb-0">Данные машины</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="vehicle_number" class="form-label">Номер машины</label>
                        <input type="text" class="form-control" id="vehicle_number" name="vehicle_number" required autocomplete="off">
                        <div class="form-text" id="vehicle_number_feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label for="vehicle_brand" class="form-label">Марка машины</label>
                        <input type="text" class="form-control" id="vehicle_brand" name="vehicle_brand" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="vehicle_color" class="form-label">Цвет машины</label>
                        <input type="text" class="form-control" id="vehicle_color" name="vehicle_color" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Примечание <span class="text-muted">(необязательно)</span></label>
                        <input type="text" class="form-control" id="notes" name="notes" autocomplete="off">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn" disabled>Добавить клиента + машину</button>
        </form>
    </div>
</div>

<script>
(function () {
    const fullNameInput = document.getElementById('full_name');
    const phoneInput = document.getElementById('phone_number');
    const innInput = document.getElementById('inn');
    const vehicleNumberInput = document.getElementById('vehicle_number');
    const vehicleBrandInput = document.getElementById('vehicle_brand');
    const vehicleColorInput = document.getElementById('vehicle_color');
    const notesInput = document.getElementById('notes');
    const submitButton = document.getElementById('submitBtn');

    const state = {
        full_name: false,
        phone: false,
        inn: false,
        vehicle_number: false,
        vehicle_brand: false,
        vehicle_color: false,
    };

    function updateSubmit() {
        submitButton.disabled = !Object.values(state).every(Boolean);
    }

    function setValid(input, feedbackEl, msg) {
        input.classList.remove('is-invalid');
        input.classList.add('is-valid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = 'green'; }
    }

    function setInvalid(input, feedbackEl, msg) {
        input.classList.remove('is-valid');
        input.classList.add('is-invalid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = 'red'; }
    }

    function setNeutral(input, feedbackEl, msg) {
        input.classList.remove('is-valid', 'is-invalid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = ''; }
    }

    // ФИО uniqueness check
    let fullNameTimer;
    fullNameInput.addEventListener('input', function () {
        clearTimeout(fullNameTimer);
        const val = this.value.trim();
        const fb = document.getElementById('full_name_feedback');
        if (!val) { setNeutral(this, fb, ''); state.full_name = false; updateSubmit(); return; }
        fullNameTimer = setTimeout(() => {
            fetch('/api/check-unique?field=full_name&value=' + encodeURIComponent(val))
                .then(r => r.json())
                .then(data => {
                    if (data.unique) { setValid(this, fb, '✓ Уникальное ФИО'); state.full_name = true; }
                    else { setInvalid(this, fb, '✗ Такой клиент уже есть'); state.full_name = false; }
                    updateSubmit();
                });
        }, 300);
    });

    // Телефон – digits only, max 10
    phoneInput.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
        const fb = document.getElementById('phone_feedback');
        if (this.value.length === 10) { setValid(this, fb, '✓ 10 цифр'); state.phone = true; }
        else { setInvalid(this, fb, `Введено ${this.value.length} из 10 цифр`); state.phone = false; }
        updateSubmit();
    });

    // ИНН – digits only, max 14
    innInput.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 14);
        const fb = document.getElementById('inn_feedback');
        if (this.value.length === 14) { setValid(this, fb, '✓ 14 цифр'); state.inn = true; }
        else { setInvalid(this, fb, `Введено ${this.value.length} из 14 цифр`); state.inn = false; }
        updateSubmit();
    });

    // Номер машины uniqueness check
    let vehicleNumberTimer;
    vehicleNumberInput.addEventListener('input', function () {
        clearTimeout(vehicleNumberTimer);
        const val = this.value.trim();
        const fb = document.getElementById('vehicle_number_feedback');
        if (!val) { setNeutral(this, fb, ''); state.vehicle_number = false; updateSubmit(); return; }
        vehicleNumberTimer = setTimeout(() => {
            fetch('/api/check-unique?field=vehicle_number&value=' + encodeURIComponent(val))
                .then(r => r.json())
                .then(data => {
                    if (data.unique) { setValid(this, fb, '✓ Уникальный номер'); state.vehicle_number = true; }
                    else { setInvalid(this, fb, '✗ Такой номер уже есть'); state.vehicle_number = false; }
                    updateSubmit();
                });
        }, 300);
    });

    // Марка
    vehicleBrandInput.addEventListener('input', function () {
        state.vehicle_brand = this.value.trim().length > 0;
        updateSubmit();
    });

    // Цвет
    vehicleColorInput.addEventListener('input', function () {
        state.vehicle_color = this.value.trim().length > 0;
        updateSubmit();
    });

    // Enter key navigation between fields
    function addEnterNav(current, next) {
        current.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                next.focus();
            }
        });
    }
    addEnterNav(fullNameInput, phoneInput);
    addEnterNav(phoneInput, innInput);
    addEnterNav(innInput, vehicleNumberInput);
    addEnterNav(vehicleNumberInput, vehicleBrandInput);
    addEnterNav(vehicleBrandInput, vehicleColorInput);
    addEnterNav(vehicleColorInput, notesInput);
    notesInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !submitButton.disabled) {
            e.preventDefault();
            document.getElementById('addClientForm').submit();
        }
    });
})();
</script>
{% endblock %}
