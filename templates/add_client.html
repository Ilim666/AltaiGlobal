{% extends "base.html" %}
{% block title %}Добавить клиента — AltaiGlobal{% endblock %}
{% block page_title %}Добавить клиента{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-md-7 col-lg-5">
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold">Имя <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required placeholder="Иван Иванов">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Телефон <span class="text-danger">*</span></label>
                <input type="tel" name="phone" class="form-control" required placeholder="+7 700 000 0000">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">ИНН</label>
                <input type="text" name="inn" class="form-control" placeholder="необязательно">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Адрес <span class="text-danger">*</span></label>
                <input type="text" name="address" class="form-control" required placeholder="г. Алматы, ул. …">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-check-lg me-1"></i>Сохранить</button>
                <a href="/clients" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
