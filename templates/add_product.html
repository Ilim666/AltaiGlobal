{% extends "base.html" %}
{% block title %}Добавить товар — AltaiGlobal{% endblock %}
{% block page_title %}Добавить товар{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-md-7 col-lg-5">
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required placeholder="Название товара">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Цена <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="number" name="price" class="form-control" required min="0" step="0.01" placeholder="0.00">
                    <span class="input-group-text">₸</span>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Количество (остаток)</label>
                <input type="number" name="quantity" class="form-control" min="0" step="1" value="0">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-fill"><i class="bi bi-check-lg me-1"></i>Сохранить</button>
                <a href="/products" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
