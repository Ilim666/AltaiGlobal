{% extends "base.html" %}

{% block title %}Добавить машину - AltaiGlobal{% endblock %}

{% block content %}
<h1>Добавить машину клиенту</h1>

<div class="row">
    <div class="col-lg-8 col-xl-7">
        <form method="POST" id="addVehicleForm">
            <input type="hidden" id="client_id" name="client_id">

            <!-- CLIENT SEARCH -->
            <div class="card mb-3">
                <div class="card-header">
                    <h6 class="mb-0">Поиск клиента</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3 position-relative">
                        <label for="client_search" class="form-label">Поиск по ФИО или телефону</label>
                        <input type="text" class="form-control" id="client_search" placeholder="Начните вводить..." autocomplete="off">
                        <div id="search_dropdown" class="list-group position-absolute w-100" style="z-index:1000; display:none; top:100%;"></div>
                    </div>
                    <div id="client_info" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">ФИО клиента</label>
                            <input type="text" class="form-control" id="disp_full_name" readonly style="background:#f0f0f0;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Номер телефона</label>
                            <input type="text" class="form-control" id="disp_phone_number" readonly style="background:#f0f0f0;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ИНН</label>
                            <input type="text" class="form-control" id="disp_inn" readonly style="background:#f0f0f0;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- VEHICLE DATA -->
            <div class="card mb-3">
                <div class="card-header">
                    <h6 class="mb-0">Данные машины</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="vehicle_number" class="form-label">Номер машины</label>
                        <input type="text" class="form-control" id="vehicle_number" name="vehicle_number" required autocomplete="off">
                        <div class="form-text" id="vehicle_number_feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label for="vehicle_brand" class="form-label">Марка машины</label>
                        <input type="text" class="form-control" id="vehicle_brand" name="vehicle_brand" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="vehicle_color" class="form-label">Цвет машины</label>
                        <input type="text" class="form-control" id="vehicle_color" name="vehicle_color" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Примечание <span class="text-muted">(необязательно)</span></label>
                        <input type="text" class="form-control" id="notes" name="notes" autocomplete="off">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn" disabled>Добавить машину</button>
        </form>
    </div>
</div>

<script>
(function () {
    const searchInput = document.getElementById('client_search');
    const dropdownElement = document.getElementById('search_dropdown');
    const clientInfoElement = document.getElementById('client_info');
    const clientIdInput = document.getElementById('client_id');
    const vehicleNumberInput = document.getElementById('vehicle_number');
    const vehicleBrandInput = document.getElementById('vehicle_brand');
    const vehicleColorInput = document.getElementById('vehicle_color');
    const submitButton = document.getElementById('submitBtn');

    const state = {
        client_selected: false,
        vehicle_number: false,
        vehicle_brand: false,
        vehicle_color: false,
    };

    function updateSubmit() {
        submitButton.disabled = !Object.values(state).every(Boolean);
    }

    function setValid(input, feedbackEl, msg) {
        input.classList.remove('is-invalid');
        input.classList.add('is-valid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = 'green'; }
    }

    function setInvalid(input, feedbackEl, msg) {
        input.classList.remove('is-valid');
        input.classList.add('is-invalid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = 'red'; }
    }

    function setNeutral(input, feedbackEl, msg) {
        input.classList.remove('is-valid', 'is-invalid');
        if (feedbackEl) { feedbackEl.textContent = msg || ''; feedbackEl.style.color = ''; }
    }

    // Client search autocomplete
    let searchTimer;
    searchInput.addEventListener('input', function () {
        clearTimeout(searchTimer);
        const q = this.value.trim();
        if (!q) { dropdown.style.display = 'none'; return; }
        searchTimer = setTimeout(() => {
            fetch('/api/search-clients?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(data => {
                    dropdownElement.innerHTML = '';
                    if (data.clients.length === 0) {
                        dropdownElement.style.display = 'none';
                        return;
                    }
                    data.clients.forEach(c => {
                        const item = document.createElement('button');
                        item.type = 'button';
                        item.className = 'list-group-item list-group-item-action';
                        item.textContent = c.full_name + ' — ' + c.phone_number;
                        item.addEventListener('click', () => {
                            selectClient(c);
                        });
                        dropdownElement.appendChild(item);
                    });
                    dropdownElement.style.display = 'block';
                });
        }, 250);
    });

    document.addEventListener('click', function (e) {
        if (!searchInput.contains(e.target) && !dropdownElement.contains(e.target)) {
            dropdownElement.style.display = 'none';
        }
    });

    function selectClient(c) {
        clientIdInput.value = c.id;
        document.getElementById('disp_full_name').value = c.full_name;
        document.getElementById('disp_phone_number').value = c.phone_number;
        document.getElementById('disp_inn').value = c.inn;
        searchInput.value = c.full_name;
        dropdownElement.style.display = 'none';
        clientInfoElement.style.display = 'block';
        state.client_selected = true;
        updateSubmit();
    }

    // Номер машины uniqueness check
    let vehicleNumberTimer;
    vehicleNumberInput.addEventListener('input', function () {
        clearTimeout(vehicleNumberTimer);
        const val = this.value.trim();
        const fb = document.getElementById('vehicle_number_feedback');
        if (!val) { setNeutral(this, fb, ''); state.vehicle_number = false; updateSubmit(); return; }
        vehicleNumberTimer = setTimeout(() => {
            fetch('/api/check-unique?field=vehicle_number&value=' + encodeURIComponent(val))
                .then(r => r.json())
                .then(data => {
                    if (data.unique) { setValid(this, fb, '✓ Уникальный номер'); state.vehicle_number = true; }
                    else { setInvalid(this, fb, '✗ Такой номер уже есть'); state.vehicle_number = false; }
                    updateSubmit();
                });
        }, 300);
    });

    vehicleBrandInput.addEventListener('input', function () {
        state.vehicle_brand = this.value.trim().length > 0;
        updateSubmit();
    });

    vehicleColorInput.addEventListener('input', function () {
        state.vehicle_color = this.value.trim().length > 0;
        updateSubmit();
    });

    // Enter key: Tab-like navigation between vehicle fields, then submit
    const notesInput = document.getElementById('notes');

    function onEnterFocus(e, nextField) {
        if (e.key === 'Enter') {
            e.preventDefault();
            nextField.focus();
        }
    }

    vehicleNumberInput.addEventListener('keydown', function (e) { onEnterFocus(e, vehicleBrandInput); });
    vehicleBrandInput.addEventListener('keydown', function (e) { onEnterFocus(e, vehicleColorInput); });
    vehicleColorInput.addEventListener('keydown', function (e) { onEnterFocus(e, notesInput); });
    notesInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !submitButton.disabled) {
            e.preventDefault();
            document.getElementById('addVehicleForm').submit();
        }
    });

    // Prevent accidental form submission on Enter in the client search field
    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
        }
    });
})();
</script>
{% endblock %}
