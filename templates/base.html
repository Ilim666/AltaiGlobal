<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AltaiGlobal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: #1f2937;
            color: #fff;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .sidebar .nav-link {
            color: #d1d5db;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.65rem 0.9rem;
            transition: all 0.2s ease;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: #374151;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
        }
        .rt-valid {
            border-color: #198754 !important;
        }
        .rt-invalid {
            border-color: #dc3545 !important;
        }
        .rt-feedback {
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .rt-feedback.valid {
            color: #198754;
        }
        .rt-feedback.invalid {
            color: #dc3545;
        }
        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 1rem;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-title">AltaiGlobal</div>
            <nav class="nav flex-column">
                <a class="nav-link {% if request.path == '/add-client' %}active{% endif %}" href="/add-client">Добавление клиента</a>
                <a class="nav-link {% if request.path == '/clients' %}active{% endif %}" href="/clients">Клиенты</a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
