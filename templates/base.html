<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AltaiGlobal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: #1f2937;
            color: #fff;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .sidebar .nav-link {
            color: #d1d5db;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.65rem 0.9rem;
            transition: all 0.2s ease;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: #374151;
        }
        .nav-section-label {
            color: #9ca3af;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.75rem 0.9rem 0.25rem;
            display: block;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
        }
        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 1rem;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-title">AltaiGlobal</div>
            <nav class="nav flex-column">
                <span class="nav-section-label">Клиенты</span>
                <a class="nav-link {% if request.path == '/add-client' %}active{% endif %}" href="/add-client">➕ Добавить клиента</a>
                <a class="nav-link {% if request.path == '/clients' or request.path.startswith('/edit-client') %}active{% endif %}" href="/clients">👥 Список клиентов</a>

                <span class="nav-section-label">Товары</span>
                <a class="nav-link {% if request.path == '/add-product' %}active{% endif %}" href="/add-product">➕ Добавить товар</a>
                <a class="nav-link {% if request.path == '/products' %}active{% endif %}" href="/products">📦 Список товаров</a>

                <span class="nav-section-label">Продажи</span>
                <a class="nav-link {% if request.path == '/sales' %}active{% endif %}" href="/sales">🛒 Новая продажа</a>
                <a class="nav-link {% if request.path == '/sales-list' %}active{% endif %}" href="/sales-list">📋 История продаж</a>

                <span class="nav-section-label">Отчёты</span>
                <a class="nav-link {% if request.path == '/reports' %}active{% endif %}" href="/reports">📊 Отчёты</a>
                <a class="nav-link {% if request.path == '/reports/by-client' %}active{% endif %}" href="/reports/by-client">👤 По клиентам</a>
                <a class="nav-link {% if request.path == '/reports/by-product' %}active{% endif %}" href="/reports/by-product">📦 По товарам</a>
                <a class="nav-link {% if request.path == '/reports/by-date' %}active{% endif %}" href="/reports/by-date">📅 По датам</a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
