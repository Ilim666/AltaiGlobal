<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AltaiGlobal CRM{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f5f6fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #e0e0e0; }
    .sidebar .nav-link { color: #444; border-radius: 8px; margin-bottom: 4px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9f0ff; color: #1a56db; }
    .sidebar .nav-link i { width: 22px; }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.07); border-radius: 12px; }
    .table th { background: #f0f4ff; }
    .btn-action { padding: 2px 8px; font-size: .82rem; }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
  <a class="navbar-brand" href="/"><i class="bi bi-shop-window me-2"></i>AltaiGlobal CRM</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/clients"><i class="bi bi-people me-1"></i>Клиенты</a></li>
      <li class="nav-item"><a class="nav-link" href="/products"><i class="bi bi-box-seam me-1"></i>Товары</a></li>
      <li class="nav-item"><a class="nav-link" href="/sales"><i class="bi bi-cart3 me-1"></i>Продажи</a></li>
      <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-bar-chart-line me-1"></i>Отчёты</a></li>
    </ul>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block sidebar py-3 px-3">
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i> Дашборд</a></li>
        <li class="nav-item"><a class="nav-link {% if '/clients' in request.path %}active{% endif %}" href="/clients"><i class="bi bi-people"></i> Клиенты</a></li>
        <li class="nav-item"><a class="nav-link {% if '/products' in request.path %}active{% endif %}" href="/products"><i class="bi bi-box-seam"></i> Товары</a></li>
        <li class="nav-item"><a class="nav-link {% if '/sales' in request.path %}active{% endif %}" href="/sales"><i class="bi bi-cart3"></i> Продажи</a></li>
        <li class="nav-item"><a class="nav-link {% if '/reports' in request.path %}active{% endif %}" href="/reports"><i class="bi bi-bar-chart-line"></i> Отчёты</a></li>
      </ul>
    </nav>

    <main class="col-md-10 py-4 px-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<!-- Toast notifications -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>Подтверждение</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="confirmMsg">Вы уверены?</div>
      <div class="modal-footer border-0">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-danger" id="confirmOk">Удалить</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type) {
  type = type || 'success';
  var el = document.getElementById('toast');
  el.className = 'toast align-items-center text-white border-0 bg-' + (type === 'success' ? 'success' : 'danger');
  document.getElementById('toastMsg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, {delay: 3000}).show();
}

var confirmCallback = null;
function confirmDelete(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg || 'Удалить запись?';
  confirmCallback = cb;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('confirmModal')).show();
}
document.getElementById('confirmOk').addEventListener('click', function() {
  bootstrap.Modal.getOrCreateInstance(document.getElementById('confirmModal')).hide();
  if (confirmCallback) confirmCallback();
});

async function apiFetch(url, opts) {
  opts = opts || {};
  var res = await fetch(url, Object.assign({headers: {'Content-Type': 'application/json'}}, opts));
  var data = await res.json().catch(function() { return {}; });
  if (!res.ok) throw data;
  return data;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
