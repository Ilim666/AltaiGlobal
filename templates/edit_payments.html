{% extends "base.html" %}
{% block title %}Редактировать оплату{% endblock %}
{% block content %}
<div class="container py-4">
    <h2>Редактирование оплаты #{{ payment.id }}</h2>
    {% if errors.main %}
      <div class="alert alert-danger">{{ errors.main }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Сумма оплаты</label>
            <input type="number" step="0.01" name="amount" value="{{ payment.amount }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Способ оплаты</label>
            <select name="payment_method" class="form-control" required>
                <option value="наличка" {% if payment.payment_method == "наличка" %}selected{% endif %}>Наличка</option>
                <option value="безнал" {% if payment.payment_method == "безнал" %}selected{% endif %}>Безнал</option>
                <option value="доллар" {% if payment.payment_method == "доллар" %}selected{% endif %}>Доллар</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="{{ url_for('payments') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
