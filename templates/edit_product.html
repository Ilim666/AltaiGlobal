{% extends "base.html" %}

{% block title %}Редактирование товара - AltaiGlobal{% endblock %}

{% block content %}
<h1>Редактирование товара</h1>

<div class="row">
    <div class="col-lg-7 col-xl-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Изменить товар #{{ product.id }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Цена (сом)</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" value="{{ product.price }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="quantity" class="form-label">Количество</label>
                        <input type="number" min="0" class="form-control" id="quantity" name="quantity" value="{{ product.quantity }}" required>
                    </div>
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <a href="/products" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
