{% extends "base.html" %}
{% block title %}Редактировать продажу{% endblock %}
{% block content %}
<div class="container py-4">
    <h2>Редактирование продажи #{{ sale.id }}</h2>
    {% if errors.main %}
      <div class="alert alert-danger">{{ errors.main }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Литры</label>
            <input type="number" step="0.01" name="liters" value="{{ sale.liters }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Цена за литр</label>
            <input type="number" step="0.01" name="price_per_liter" value="{{ sale.price_per_liter }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Сумма оплаты</label>
            <input type="number" step="0.01" name="payment_amount" value="{{ sale.payment_amount or '' }}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Способ оплаты</label>
            <select name="payment_method" class="form-control" required>
                <option value="наличка" {% if sale.payment_method == "наличка" %}selected{% endif %}>Наличка</option>
                <option value="безнал" {% if sale.payment_method == "безнал" %}selected{% endif %}>Безнал</option>
                <option value="доллар" {% if sale.payment_method == "доллар" %}selected{% endif %}>Доллар</option>
                <option value="долг" {% if sale.payment_method == "долг" %}selected{% endif %}>Долг</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Примечание</label>
            <textarea name="note" class="form-control">{{ sale.note or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="{{ url_for('sales_journal') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
